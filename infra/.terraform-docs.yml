formatter: "markdown"

version: ">= 0.15.0"

header-from: main.tf
footer-from: ""

sections:
  hide: []
  show: []

content: ""

output:
  file: "README.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    <!-- Automatically generated by terraform-docs. Do not manually adjust between the BEGIN_TF_DOCS and END_TF_DOCS lines. -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: true
  html: true
  indent: 2
  lockfile: true
  required: true
  sensitive: true
  type: true